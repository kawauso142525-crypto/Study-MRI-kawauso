<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    管理アプリ
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <h1>
    管理アプリ
  </h1>

  <!-- ログイン -->
  <div class="auth-area">

    <button id="loginButton">
      Googleログイン
    </button>

    <span id="userInfo"></span>

  </div>

  <!-- フォルダ -->
  <div class="folder-controls">

    <select id="folderSelect"></select>

    <button id="newFolderButton">
      ＋ フォルダ追加
    </button>

  </div>

  <!-- ファイル -->
  <div class="file-controls">

    <select id="fileSelect"></select>

    <button id="newFileButton">
      ＋ 新規ファイル
    </button>

    <button id="deleteFileButton">
      － ファイル削除
    </button>

  </div>

  <!-- テーブル操作 -->
  <div class="controls">

    <button id="addRowButton">
      ＋ 行追加
    </button>

    <button id="deleteRowButton">
      － 行削除
    </button>

    <button id="addColumnButton">
      ＋ 列追加
    </button>

    <button id="deleteColumnButton">
      － 列削除
    </button>

    <button id="saveButton">
      保存
    </button>

  </div>

  <!-- テーブル -->
  <div id="tableContainer"></div>

  <!-- Firebase -->
  <script
    type="module"
    src="js/firebase.js"
  ></script>

  <!-- Storage -->
  <script
    src="js/storage.js"
  ></script>

  <!-- Suggest -->
  <script
    src="js/suggestion.js"
  ></script>

  <!-- Table -->
  <script
    src="js/table.js"
  ></script>

  <!-- App -->
  <script
    src="js/app.js"
  ></script>

</body>

</html>
