<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  />

  <title>
    Table Manager
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- TITLE -->
  <h1>
    Table Manager
  </h1>

  <!-- APP LAYOUT -->
  <div class="appLayout">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- LOGIN PANEL -->
      <div class="panel">

        <h2>
          ログイン
        </h2>

        <div class="buttonRow">

          <button id="loginButton">
            Googleログイン
          </button>

        </div>

        <div id="userInfo">
        </div>

      </div>

      <!-- FOLDER PANEL -->
      <div class="panel">

        <h2>
          フォルダ
        </h2>

        <div class="buttonRow">

          <button id="backFolderButton">
            ← 戻る
          </button>

          <button id="newFolderButton">
            新規フォルダ
          </button>

          <button id="newSubFolderButton">
            子フォルダ
          </button>

          <button id="deleteFolderButton">
            フォルダ削除
          </button>

        </div>

        <!-- TREE UI -->
        <div id="folderTree">
        </div>

        <!-- EXISTING SELECT -->
        <select id="folderSelect">
        </select>

        <div id="currentPath">
        </div>

      </div>

      <!-- FILE PANEL -->
      <div class="panel">

        <h2>
          ファイル
        </h2>

        <div class="buttonRow">

          <button id="newFileButton">
            新規ファイル
          </button>

          <button id="saveButton">
            保存
          </button>

          <button id="deleteFileButton">
            ファイル削除
          </button>

        </div>

        <select id="fileSelect">
        </select>

      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="mainContent">

      <!-- TABLE PANEL -->
      <div class="panel">

        <h2>
          テーブル
        </h2>

        <div class="buttonRow">

          <button id="addRowButton">
            行追加
          </button>

          <button id="deleteRowButton">
            行削除
          </button>

          <button id="addColumnButton">
            列追加
          </button>

          <button id="deleteColumnButton">
            列削除
          </button>

        </div>

        <div class="table-wrapper">

          <div id="tableContainer">
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- JS -->
  <script
    type="module"
    src="firebase.js"
  ></script>

  <script src="storage.js"></script>

  <script src="table.js"></script>

  <script src="suggestion.js"></script>

  <script src="app.js"></script>

</body>

</html>
